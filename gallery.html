      </nav>

  </header>

  <main>
    <section class="section gallery-section">
      <div class="container">
        <header class="gallery-page-header text-center">
          <h1>Our Events 📸</h1>
          <p>A glimpse at the celebrations we&rsquo;ve been part of. 🎉</p>
        </header>

        <div class="gallery-slideshow" role="region" aria-label="Image gallery">
          <div class="gallery-view">
            <div class="gallery-track">
              <div class="gallery-slide" data-index="0">
                <img src="images/gal1.jpeg" alt="Gallery photo from our events.">
              </div>
              <div class="gallery-slide" data-index="1">
                <img src="images/gal2.jpeg" alt="Gallery photo from our events.">
              </div>
              <div class="gallery-slide" data-index="2">
                <img src="images/gal3.jpeg" alt="Gallery photo from our events.">
              </div>
              <div class="gallery-slide" data-index="3">
                <img src="images/gal4.jpeg" alt="Gallery photo from our events.">
              </div>
              <div class="gallery-slide" data-index="4">
                <img src="images/gal5.jpeg" alt="Gallery photo from our events.">
              </div>
              <div class="gallery-slide" data-index="5">
                <img src="images/gal6.jpeg" alt="Gallery photo from our events.">
              </div>
              <div class="gallery-slide" data-index="6">
                <img src="images/gal7.jpg" alt="Gallery photo from our events.">
              </div>
              <div class="gallery-slide" data-index="7">
                <img src="images/gal8.jpg" alt="Gallery photo from our events.">
              </div>
              <div class="gallery-slide" data-index="8">
                <img src="images/gal10.jpeg" alt="Gallery photo from our events.">
              </div>
              <div class="gallery-slide" data-index="9">
                <img src="images/gall11.jpeg" alt="Gallery photo from our events.">
              </div>
              <div class="gallery-slide" data-index="10">
                <img src="images/gal12.jpg" alt="Gallery photo from our events.">
              </div>
              <div class="gallery-slide" data-index="11">
                <img src="images/gal13.jpeg" alt="Gallery photo from our events.">
              </div>
              <div class="gallery-slide" data-index="12">
                <img src="images/gal15.JPG" alt="Gallery photo from our events.">
              </div>
              <div class="gallery-slide" data-index="13">
                <img src="images/gal16.JPEG" alt="Gallery photo from our events.">
              </div>
            </div>
          </div>

          <button type="button" class="gallery-btn gallery-prev" aria-label="Previous image">&#10094;</button>
          <button type="button" class="gallery-btn gallery-next" aria-label="Next image">&#10095;</button>

          <div class="gallery-counter" aria-live="polite">1 / 14</div>

          <div class="gallery-thumbs" aria-label="Gallery thumbnails">
            <button type="button" class="gallery-thumb active" data-index="0" aria-label="Go to image 1"><img src="images/gal1.jpeg" alt=""></button>
            <button type="button" class="gallery-thumb" data-index="1" aria-label="Go to image 2"><img src="images/gal2.jpeg" alt=""></button>
            <button type="button" class="gallery-thumb" data-index="2" aria-label="Go to image 3"><img src="images/gal3.jpeg" alt=""></button>
            <button type="button" class="gallery-thumb" data-index="3" aria-label="Go to image 4"><img src="images/gal4.jpeg" alt=""></button>
            <button type="button" class="gallery-thumb" data-index="4" aria-label="Go to image 5"><img src="images/gal5.jpeg" alt=""></button>
            <button type="button" class="gallery-thumb" data-index="5" aria-label="Go to image 6"><img src="images/gal6.jpeg" alt=""></button>
            <button type="button" class="gallery-thumb" data-index="6" aria-label="Go to image 7"><img src="images/gal7.jpg" alt=""></button>
            <button type="button" class="gallery-thumb" data-index="7" aria-label="Go to image 8"><img src="images/gal8.jpg" alt=""></button>

            <button type="button" class="gallery-thumb" data-index="10" aria-label="Go to image 11"><img src="images/gal12.jpg" alt=""></button>
            <button type="button" class="gallery-thumb" data-index="11" aria-label="Go to image 12"><img src="images/gal13.jpeg" alt=""></button>
            <button type="button" class="gallery-thumb" data-index="12" aria-label="Go to image 13"><img src="images/gal15.JPG" alt=""></button>
            <button type="button" class="gallery-thumb" data-index="13" aria-label="Go to image 14"><img src="images/gal16.JPEG" alt=""></button>
          </div>
        </div>

        <div class="gallery-lightbox" id="gallery-lightbox" aria-hidden="true" role="dialog" aria-label="Full screen image">
          <button type="button" class="gallery-lightbox-close" aria-label="Close">&#10005;</button>
          <div class="gallery-lightbox-inner">
            <img class="gallery-lightbox-img" src="" alt="Gallery photo full size">
          </div>
          <button type="button" class="gallery-lightbox-prev" aria-label="Previous image">&#10094;</button>
          <button type="button" class="gallery-lightbox-next" aria-label="Next image">&#10095;</button>
        </div>
